# GitHub: Settings → Pages → Source: GitHub Actions
# Secrets (Actions): VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY
# Variable VITE_BASE_PATH: для репо username.github.io укажите / , иначе оставьте пустым (будет /имя-репо/)

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          if [ -n "${{ vars.VITE_BASE_PATH }}" ]; then
            export VITE_BASE_PATH="${{ vars.VITE_BASE_PATH }}"
          else
            export VITE_BASE_PATH="/$REPO_NAME/"
          fi
          echo "VITE_BASE_PATH=$VITE_BASE_PATH"
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
