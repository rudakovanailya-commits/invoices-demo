# GitHub: Settings → Pages → Source: GitHub Actions
# Secrets (Actions): VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY
# Variable VITE_BASE_PATH: для репо username.github.io укажите / , иначе оставьте пустым (будет /имя-репо/)

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Проверка секретов Supabase (без них сайт падает при загрузке)
        run: |
          if [ -z "${{ secrets.VITE_SUPABASE_URL }}" ] || [ -z "${{ secrets.VITE_SUPABASE_ANON_KEY }}" ]; then
            echo "::error::В Settings → Secrets and variables → Actions задайте непустые VITE_SUPABASE_URL и VITE_SUPABASE_ANON_KEY"
            exit 1
          fi
      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          REPO_NAME: ${{ github.event.repository.name }}
          # если задать в Settings → Variables, иначе пусто и подставится /repo/
          VITE_BASE_PATH_INPUT: ${{ vars.VITE_BASE_PATH }}
        run: |
          set -e
          if [ -n "$VITE_BASE_PATH_INPUT" ]; then
            export VITE_BASE_PATH="$VITE_BASE_PATH_INPUT"
          else
            export VITE_BASE_PATH="/${REPO_NAME}/"
          fi
          echo "VITE_BASE_PATH=$VITE_BASE_PATH"
          npm run build
      - name: Проверка dist (только bundle, не src/main.*)
        run: |
          set -e
          if grep -qE 'src/main\.(tsx|jsx|ts|js)"' dist/index.html; then
            echo 'ERROR: dist/index.html ссылается на исходник entry вместо /assets/ — публикация даст MIME error' >&2
            cat dist/index.html
            exit 1
          fi
          if ! grep -q '/assets/' dist/index.html; then
            echo 'ERROR: в dist/index.html нет ссылок на /assets/ (сборка или base неверны)' >&2
            cat dist/index.html
            exit 1
          fi
          test -f dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
