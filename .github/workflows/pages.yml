# Деплой только через GitHub Actions (официальный артефакт → Pages).
#
# Обязательно в репозитории: Settings → Pages → Build and deployment
#   → Source: GitHub Actions  (НЕ «Deploy from a branch» — иначе отдаётся исходник, MIME/404)
#
# Secrets → Actions: VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY (для сборки Vite)

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Проверка секретов Supabase
        run: |
          if [ -z "${{ secrets.VITE_SUPABASE_URL }}" ] || [ -z "${{ secrets.VITE_SUPABASE_ANON_KEY }}" ]; then
            echo "::error::Добавьте в Settings → Secrets → Actions: VITE_SUPABASE_URL и VITE_SUPABASE_ANON_KEY"
            exit 1
          fi

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Проверка dist (index + base /invoices-demo/)
        run: |
          set -e
          test -f dist/index.html
          test -f dist/.nojekyll
          if grep -qE 'src/main\.(tsx|jsx|ts|js)"' dist/index.html; then
            echo 'ERROR: в dist не должно быть ссылки на src/main — только production bundle' >&2
            cat dist/index.html
            exit 1
          fi
          if ! grep -q '"/invoices-demo/assets/' dist/index.html; then
            echo 'ERROR: в dist/index.html ожидаются пути "/invoices-demo/assets/..." (проверьте base в vite.config.ts)' >&2
            cat dist/index.html
            exit 1
          fi
          echo "OK — head dist/index.html:"
          head -20 dist/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
